<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>

    <linearGradient id="hexBody" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#5ECFEE"/>
      <stop offset="40%"  stop-color="#1AAAD4"/>
      <stop offset="100%" stop-color="#0572A8"/>
    </linearGradient>

    <linearGradient id="bevelTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="nodeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00FFEE"/>
      <stop offset="100%" stop-color="#00AACC" stop-opacity="0.5"/>
    </radialGradient>

    <filter id="hexGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0.5 1 0 0  0 0.5 1 0 0  0 0.5 1 0 0  0 0 0 0.45 0" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#003A5A" flood-opacity="0.5"/>
    </filter>

    <!-- Clip to hex interior -->
    <clipPath id="hexClip">
      <polygon points="100,32 161,68 161,132 100,168 39,132 39,68"/>
    </clipPath>

  </defs>

  <!-- Circuit traces outside hex -->
  <polyline points="148,62 165,45 188,45" fill="none" stroke="#00C8E0" stroke-width="1.5" opacity="0.8"/>
  <circle cx="188" cy="45" r="4" fill="url(#nodeGrad)"/><circle cx="188" cy="45" r="2" fill="#00FFEE"/>

  <polyline points="168,100 192,100 192,125" fill="none" stroke="#00C8E0" stroke-width="1.5" opacity="0.7"/>
  <circle cx="192" cy="125" r="4" fill="url(#nodeGrad)"/><circle cx="192" cy="125" r="2" fill="#00FFEE"/>

  <polyline points="148,138 165,155 185,155" fill="none" stroke="#00C8E0" stroke-width="1.5" opacity="0.7"/>
  <circle cx="185" cy="155" r="4" fill="url(#nodeGrad)"/><circle cx="185" cy="155" r="2" fill="#00FFEE"/>

  <polyline points="32,100 8,100 8,75" fill="none" stroke="#00C8E0" stroke-width="1.5" opacity="0.7"/>
  <circle cx="8" cy="75" r="4" fill="url(#nodeGrad)"/><circle cx="8" cy="75" r="2" fill="#00FFEE"/>

  <polyline points="52,62 35,45 14,45" fill="none" stroke="#00C8E0" stroke-width="1.5" opacity="0.7"/>
  <circle cx="14" cy="45" r="4" fill="url(#nodeGrad)"/><circle cx="14" cy="45" r="2" fill="#00FFEE"/>

  <polyline points="52,138 35,155 16,155" fill="none" stroke="#00C8E0" stroke-width="1.5" opacity="0.6"/>
  <circle cx="16" cy="155" r="4" fill="url(#nodeGrad)"/><circle cx="16" cy="155" r="2" fill="#00FFEE"/>

  <!-- Outer hex white border -->
  <polygon points="100,22 168,62 168,138 100,178 32,138 32,62"
    fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.55" filter="url(#hexGlow)"/>

  <!-- Hex body -->
  <polygon points="100,32 161,68 161,132 100,168 39,132 39,68"
    fill="url(#hexBody)" filter="url(#shadow)"/>
  <polygon points="100,32 161,68 161,132 100,168 39,132 39,68"
    fill="url(#bevelTop)"/>
  <polyline points="100,44 154,76 154,124"
    fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.25"/>

  <!-- All cable content clipped inside hex -->
  <g clip-path="url(#hexClip)">

    <!-- S cable path — normal S, top bows LEFT bottom bows RIGHT, compact -->
    <!-- Shadow -->
    <path d="M 100,70 C 82,68 72,75 72,85 C 72,94 80,98 90,100 C 100,102 122,104 124,116 C 126,124 118,130 100,130"
      fill="none" stroke="#001828" stroke-width="9" stroke-linecap="round" opacity="0.4" transform="translate(1,2)"/>

    <!-- Outer sheath dark -->
    <path d="M 100,70 C 82,68 72,75 72,85 C 72,94 80,98 90,100 C 100,102 122,104 124,116 C 126,124 118,130 100,130"
      fill="none" stroke="#0A1E38" stroke-width="9" stroke-linecap="round"/>

    <!-- Mid blue -->
    <path d="M 100,70 C 82,68 72,75 72,85 C 72,94 80,98 90,100 C 100,102 122,104 124,116 C 126,124 118,130 100,130"
      fill="none" stroke="#1A8ACC" stroke-width="6" stroke-linecap="round"/>

    <!-- Bright core -->
    <path d="M 100,70 C 82,68 72,75 72,85 C 72,94 80,98 90,100 C 100,102 122,104 124,116 C 126,124 118,130 100,130"
      fill="none" stroke="#5ECFEE" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Shimmer highlight -->
    <path d="M 100,70 C 84,68 72,74 72,84"
      fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
    <path d="M 124,116 C 126,123 118,130 100,130"
      fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>

    <!-- TOP CONNECTOR -->
    <rect x="87" y="57" width="26" height="15" rx="2.5" fill="#0A1E38" stroke="#5ECFEE" stroke-width="1.2"/>
    <rect x="91" y="60" width="18" height="9"  rx="1.2" fill="#001828" stroke="#1AABDD" stroke-width="0.7"/>
    <rect x="93"  y="62" width="3" height="5" rx="0.8" fill="#5ECFEE" opacity="0.9"/>
    <rect x="99"  y="62" width="3" height="5" rx="0.8" fill="#5ECFEE" opacity="0.9"/>
    <rect x="105" y="62" width="3" height="5" rx="0.8" fill="#5ECFEE" opacity="0.9"/>
    <rect x="83" y="61" width="4" height="5" rx="1.5" fill="#1AABDD"/>
    <rect x="113" y="61" width="4" height="5" rx="1.5" fill="#1AABDD"/>
    <circle cx="91"  cy="59" r="1.2" fill="#1AABDD" opacity="0.7"/>
    <circle cx="109" cy="59" r="1.2" fill="#1AABDD" opacity="0.7"/>
    <circle cx="91"  cy="70" r="1.2" fill="#1AABDD" opacity="0.7"/>
    <circle cx="109" cy="70" r="1.2" fill="#1AABDD" opacity="0.7"/>

    <!-- BOTTOM CONNECTOR -->
    <rect x="87" y="128" width="26" height="14" rx="2.5" fill="#0A1E38" stroke="#5ECFEE" stroke-width="1.2"/>
    <rect x="93"  y="136" width="3" height="9" rx="1" fill="#F5C200"/>
    <rect x="99"  y="136" width="3" height="9" rx="1" fill="#F5C200"/>
    <rect x="105" y="136" width="3" height="9" rx="1" fill="#F5C200"/>
    <circle cx="94"  cy="133" r="1.8" fill="#FFE066" opacity="0.9"/>
    <circle cx="100" cy="133" r="1.8" fill="#FFE066" opacity="0.9"/>
    <circle cx="106" cy="133" r="1.8" fill="#FFE066" opacity="0.9"/>
    <circle cx="91"  cy="130" r="1.2" fill="#1AABDD" opacity="0.7"/>
    <circle cx="109" cy="130" r="1.2" fill="#1AABDD" opacity="0.7"/>
    <circle cx="91"  cy="140" r="1.2" fill="#1AABDD" opacity="0.7"/>
    <circle cx="109" cy="140" r="1.2" fill="#1AABDD" opacity="0.7"/>

  </g>

</svg>